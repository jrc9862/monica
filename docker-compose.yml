services:
  app:
    build: .
    image: monica-fork:latest
    restart: unless-stopped
    ports:
      - '8081:80'
    env_file:
      - .env
    volumes:
      - monica-storage:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monica-net

  queue:
    image: monica-fork:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=10 --timeout=0 --tries=3 --queue=high,default,low
    env_file:
      - .env
    volumes:
      - monica-storage:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monica-net

  scheduler:
    image: monica-fork:latest
    restart: unless-stopped
    command: bash -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file:
      - .env
    volumes:
      - monica-storage:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - monica-net

  mariadb:
    image: mariadb:lts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - monica-net
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      retries: 5
      timeout: 5s

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - monica-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s

networks:
  monica-net:
    driver: bridge

volumes:
  monica-storage:
  mariadb-data:
  redis-data:
